name: Python CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"] # Define the Python versions to test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5 # Use v5 for broader support
        with:
          python-version: ${{ matrix.python-version }} # Use the matrix variable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          # If you have a requirements.txt file, install it here
          # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: pytest
